  <!-- 质量仪表盘外圈 -->
  <circle cx="12" cy="12" r="9" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  
  <!-- 质量仪表盘进度 -->
  <path d="M 12 3 A 9 9 0 0 1 21 12" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 中心点 -->
