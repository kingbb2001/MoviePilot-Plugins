  <line x1="18" y1="6" x2="17" y2="7" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="12" x2="18.5" y2="12" stroke="white" stroke-width="0.8" opacity="0.6"/>
  
  <!-- HD标识 -->
